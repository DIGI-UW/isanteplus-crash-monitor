# isanteplus-monitor configuration

# URL to check for responsiveness
SESSION_URL="http://localhost:8080/openmrs/ws/rest/v1/session"

# Timeout in seconds for the HTTP request
TIMEOUT=15

# Polling interval in seconds
POLL_INTERVAL=15

# Directory to store diagnostic output
OUTPUT_DIR="/var/log/isanteplus-monitor"

# Path to the OpenMRS log file
OPENMRS_LOG="/usr/share/tomcat7/.OpenMRS/openmrs.log"

# Whether to restart Tomcat7 after collecting diagnostics
RESTART_TOMCAT=true

# MySQL connection settings
MYSQL_USER="root"
MYSQL_PASSWORD=""
MYSQL_DATABASE="openmrs"
MYSQL_HOST="localhost"

# Pattern to find the Tomcat JVM process (used by all scripts)
TOMCAT_PATTERN="catalina.startup.Bootstrap"

# ── Retention ────────────────────────────────────────────────────────
# Days to keep incident diagnostics and snapshot data
RETENTION_DAYS=7

# ── Heap dumps ───────────────────────────────────────────────────────
# Full heap dumps (jmap -dump) produce 1-2GB files.
# Disabled by default; jstack thread dumps and jmap -histo are always captured.
ENABLE_HEAP_DUMP=false

# ── JDK tools ────────────────────────────────────────────────────────
# If jstat/jstack/jmap are not on the default PATH, set JAVA_HOME here.
# The scripts will add $JAVA_HOME/bin to PATH if set.
# Example: JAVA_HOME="/usr/lib/jvm/java-8-openjdk-amd64"
#JAVA_HOME=""
